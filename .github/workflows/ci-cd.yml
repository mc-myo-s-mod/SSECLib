name: CI / CD

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]
    tags: [ "v*" ]

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────
  # Build & Test
  # ─────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build -x javadoc

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/*.jar
          retention-days: 7

  # ─────────────────────────────────────
  # Publish to Maven Central
  # ─────────────────────────────────────
  publish:
    name: Publish to Maven Central
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Validate tag matches project version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PROJECT_VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "❌ Tag version ($TAG_VERSION) does not match project version ($PROJECT_VERSION)"
            exit 1
          fi
          echo "✅ Version matched: $TAG_VERSION"

      - name: Publish to Maven Central
        run: ./gradlew publish -x javadoc
        env:
          OSSRH_USERNAME: ${{ secrets.MAVEN_ID }}
          OSSRH_PASSWORD: ${{ secrets.MAVEN_PW }}
          SIGNING_KEY: ${{ secrets.GPG_SECRET_KEY }}
          SIGNING_PASSWORD: ${{ secrets.GPG_PASSWORD }}
